# ──────────────────────────────────────────────────────────────
# Release Watcher
#
# Root cause this fixes:
#   When a release tag (vX.Y.Z) is created out-of-band — e.g. via
#   the GitHub web UI, GitHub API, or the Lovable release tooling
#   that lands `.gitmap/release/vX.Y.Z.json` on main — the
#   `push: tags: v*` trigger in release.yml does NOT always fire.
#   The result: a tag exists, the Release page is created with
#   only auto-generated source archives, and `marco-extension-*.zip`
#   plus the rest of the built assets never get uploaded.
#
# What this watcher does:
#   On every push to main that touches `.gitmap/release/v*.json`,
#   `.gitmap/release/latest.json`, or the release workflow files, it reads
#   the version from the descriptor, verifies the matching `vX.Y.Z` tag
#   exists on origin, and calls the canonical release.yml workflow in-process
#   with that version. This is deliberate: an async `gh workflow run` can be
#   queued against stale workflow logic and the watcher can still pass while
#   the release page remains source-only. release.yml's workflow_call path
#   then checks out either the exact tag or, for stale-tag recovery, the fixed
#   current commit as source while keeping the existing tag as the publish
#   target. It builds every asset, gates on required-asset verification, and
#   uploads to the GitHub Release.
#
# This makes asset publication deterministic regardless of how
# the tag was created.
# ──────────────────────────────────────────────────────────────

name: Release Watcher

on:
  push:
    branches:
      - main
    paths:
      - ".gitmap/release/v*.json"
      - ".gitmap/release/latest.json"
      - ".github/workflows/release.yml"
      - ".github/workflows/release-watcher.yml"
  # Self-heal path: catch ANY GitHub Release that lands without assets,
  # regardless of how the tag/release was created (web UI, REST API,
  # Lovable tooling). See changelog v3.22.0 RCA.
  release:
    types: [published, created, edited]
  workflow_dispatch:


permissions:
  contents: read
  actions: write

concurrency:
  group: release-watcher-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: Resolve release descriptor
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.resolve.outputs.skip }}
      tag: ${{ steps.resolve.outputs.tag }}
      source_ref: ${{ steps.resolve.outputs.source_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve target version from changed descriptor
        id: resolve
        run: |
          set -euo pipefail
          CANDIDATES=()
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Self-heal: a Release was published (possibly out-of-band with no assets).
            # Skip descriptor lookup entirely and dispatch the canonical build.
            TAG="${{ github.event.release.tag_name }}"
            if [[ -z "$TAG" ]]; then
              echo "::error::release event fired without a tag_name"
              exit 1
            fi
            git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
            if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "::error::release event for ${TAG} — tag not found on remote"
              exit 1
            fi
            TAG_COMMIT=$(git rev-list -n 1 "refs/tags/${TAG}")
            HEAD_COMMIT=$(git rev-parse HEAD)
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            if [[ "${TAG_COMMIT}" != "${HEAD_COMMIT}" ]]; then
              echo "source_ref=${HEAD_COMMIT}" >> "$GITHUB_OUTPUT"
            else
              echo "source_ref=" >> "$GITHUB_OUTPUT"
            fi
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Self-heal: dispatching release.yml for ${TAG}"
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
              CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" -- '.gitmap/release/*.json' || true)
            else
              CHANGED=$(git diff-tree --no-commit-id --name-only -r "$AFTER" -- '.gitmap/release/*.json' || true)
            fi
            while IFS= read -r file; do
              if [[ "$file" =~ ^\.gitmap/release/v.+\.json$ ]]; then
                CANDIDATES+=("$file")
              fi
            done <<< "$CHANGED"
            while IFS= read -r file; do
              if [[ "$file" == ".gitmap/release/latest.json" ]]; then
                CANDIDATES+=("$file")
              fi
            done <<< "$CHANGED"
          fi


          if [[ "${#CANDIDATES[@]}" -eq 0 && -f ".gitmap/release/latest.json" ]]; then
            CANDIDATES+=(".gitmap/release/latest.json")
          fi

          DESCRIPTOR="${CANDIDATES[0]:-}"
          if [[ "${#CANDIDATES[@]}" -gt 1 ]]; then
            for file in "${CANDIDATES[@]}"; do
              if [[ "$file" =~ ^\.gitmap/release/v.+\.json$ ]]; then
                DESCRIPTOR="$file"
                break
              fi
            done
          fi
          if [[ ! -f "$DESCRIPTOR" ]]; then
            echo "::warning::No release descriptor present — nothing to dispatch"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG=$(DESCRIPTOR="$DESCRIPTOR" node -e "const fs=require('node:fs'); const j=JSON.parse(fs.readFileSync(process.env.DESCRIPTOR,'utf8')); const version=String(j.version || '').replace(/^v/,''); process.stdout.write(j.tag || (version ? 'v'+version : ''))")
          if [[ -z "$TAG" ]]; then
            echo "::error::Could not derive tag from $DESCRIPTOR"
            exit 1
          fi
          # Make sure the tag exists on origin before we dispatch
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
          if ! git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Descriptor references ${TAG} but tag not found on origin"
            exit 1
          fi
          TAG_COMMIT=$(git rev-list -n 1 "refs/tags/${TAG}")
          HEAD_COMMIT=$(git rev-parse HEAD)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [[ "${TAG_COMMIT}" != "${HEAD_COMMIT}" ]]; then
            echo "source_ref=${HEAD_COMMIT}" >> "$GITHUB_OUTPUT"
            echo "Recovery source override: tag ${TAG} points at ${TAG_COMMIT}, but fixed workflow commit is ${HEAD_COMMIT}"
          else
            echo "source_ref=" >> "$GITHUB_OUTPUT"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Will run release.yml for ${TAG}"

  run-release:
    name: Run release build for descriptor
    needs: resolve-release
    if: needs.resolve-release.outputs.skip != 'true'
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      version: ${{ needs.resolve-release.outputs.tag }}
      source_ref: ${{ needs.resolve-release.outputs.source_ref }}

  release-asset-guard:
    name: Verify release page has built assets
    needs:
      - resolve-release
      - run-release
    if: always() && needs.resolve-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Fail fast if Release page is missing required assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VER: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail
          REQUIRED=(
            "marco-extension-${VER}.zip"
            "macro-controller-${VER}.zip"
            "marco-sdk-${VER}.zip"
            "xpath-${VER}.zip"
            "payment-banner-hider-${VER}.zip"
            "lovable-common-${VER}.zip"
            "lovable-owner-switch-${VER}.zip"
            "lovable-user-add-${VER}.zip"
            "lovable-dashboard-${VER}.zip"
            "install.ps1"
            "install.sh"
            "VERSION.txt"
            "changelog.md"
            "checksums.txt"
          )
          ASSETS=$(gh release view "${VER}" --repo "${REPO}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          if [[ -z "${ASSETS}" ]]; then
            echo "::error::Release ${VER} has NO uploaded assets — release.yml never produced or uploaded them."
            exit 1
          fi
          MISSING=0
          for a in "${REQUIRED[@]}"; do
            if ! printf '%s\n' "${ASSETS}" | grep -qx "${a}"; then
              echo "::error::Release ${VER} missing asset: ${a}"
              MISSING=$((MISSING+1))
            fi
          done
          if [[ "${MISSING}" -gt 0 ]]; then
            echo "::error::${MISSING} required asset(s) missing on Release ${VER}"
            exit 1
          fi
          echo "✅ Release ${VER} has all required built assets"
