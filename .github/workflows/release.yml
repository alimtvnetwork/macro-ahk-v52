# ──────────────────────────────────────────────────────────────
# Marco Extension — Release Pipeline
#
# Pipeline structure (parallel jobs):
#   1. setup        — checkout, resolve version, lint, test
#   2. build-sdk    — Marco SDK (dependency for others)
#   3. build-standalone (parallel) — XPath, Macro Controller, Prompts
#   4. build-extension — Chrome extension + package + release
#
# Produces a GitHub Release with these assets:
#   - marco-extension-{VER}.zip    — Chrome extension dist contents
#   - prompts-{VER}.zip            — standalone-scripts/prompts/**
#   - macro-controller-{VER}.zip   — standalone-scripts/macro-controller/**
#   - marco-sdk-{VER}.zip          — standalone-scripts/marco-sdk/**
#   - xpath-{VER}.zip              — standalone-scripts/xpath/**
#   - payment-banner-hider-{VER}.zip — standalone-scripts/payment-banner-hider/**
#   - lovable-common-{VER}.zip     — standalone-scripts/lovable-common/**
#   - lovable-owner-switch-{VER}.zip — standalone-scripts/lovable-owner-switch/**
#   - lovable-user-add-{VER}.zip   — standalone-scripts/lovable-user-add/**
#   - lovable-dashboard-{VER}.zip  — standalone-scripts/lovable-dashboard/**
#   - install.sh                   — Unified Bash installer (URL-pinned or latest)
#   - install.ps1                  — Unified PowerShell installer (URL-pinned or latest)
#   - VERSION.txt                  — Plain-text version identifier
#   - changelog.md                 — Project changelog (full)
#   - checksums.txt                — SHA256 checksums of all assets
#
# When the installer is downloaded from this release's asset URL
# (https://github.com/{repo}/releases/download/{VER}/install.{ps1,sh}),
# it auto-derives {VER} from its own URL and is implicitly pinned. When
# downloaded from raw.githubusercontent.com/.../main/, it falls back to
# the GitHub `latest` release. No build-time stamping required.
#
# NOTE: No email or notification integrations — by design.
# ──────────────────────────────────────────────────────────────

name: Release Build

on:
  create:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"
  # CRITICAL: `release` event fires for ALL publish paths — REST API,
  # GitHub web UI, gh CLI, external release tooling. This is the only
  # trigger that reliably catches tags created server-side via the
  # Releases API (which do NOT fire push/create webhooks). Without this,
  # API-created releases land with only the uploader's own assets and
  # GitHub's auto-generated source archives — the symptom seen on v3.1.0.
  release:
    types: [published, created, edited, released]
  # Manual replay path — used to recover a release whose original tag/create
  # event never reached Actions.
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing tag to (re)publish, e.g. v2.192.0'
        required: true
        type: string
      source_ref:
        description: 'Optional source ref/SHA to build from while uploading to the existing version tag. Use only to recover a stale broken tag.'
        required: false
        type: string
  workflow_call:
    inputs:
      version:
        description: 'Existing tag to (re)publish, e.g. v2.192.0'
        required: true
        type: string
      source_ref:
        description: 'Optional source ref/SHA to build from while uploading to the existing version tag. Use only to recover a stale broken tag.'
        required: false
        type: string
        default: ''

# Release builds must NEVER be cancelled — every release commit
# must produce a GitHub Release regardless of newer commits.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ════════════════════════════════════════════════════════════
  # Job 1: Setup, Lint, Test, Resolve Version
  # ════════════════════════════════════════════════════════════
  setup:
    name: Setup · Lint · Test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      ref: ${{ steps.version.outputs.ref }}
      publish_tag: ${{ steps.version.outputs.publish_tag }}
      skip: ${{ steps.version.outputs.skip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and ref
        id: version
        env:
          EVENT_REF: ${{ github.event.ref }}
          EVENT_REF_TYPE: ${{ github.event.ref_type }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref || github.event.inputs.source_ref }}
          INPUT_VERSION: ${{ inputs.version || github.event.inputs.version }}
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
            SOURCE_REF="${INPUT_SOURCE_REF}"
            # Validate the tag exists on the remote. Reusable workflow calls
            # inherit the caller event context (for Release Watcher this is a
            # push to main), so version inputs must win over GITHUB_REF.
            if ! git rev-parse --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
              git fetch origin "refs/tags/${VERSION}:refs/tags/${VERSION}" 2>/dev/null || true
            fi
            if ! git rev-parse --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
              echo "::error::release recovery version '${VERSION}' — tag refs/tags/${VERSION} not found on remote"
              exit 1
            fi
            if [[ -n "$SOURCE_REF" ]]; then
              REF="$SOURCE_REF"
              if ! git rev-parse --verify "${REF}^{commit}" >/dev/null 2>&1; then
                git fetch origin "$REF" --depth=1 2>/dev/null || true
              fi
              if ! git rev-parse --verify "${REF}^{commit}" >/dev/null 2>&1; then
                echo "::error::source_ref '${SOURCE_REF}' could not be resolved to a commit"
                exit 1
              fi
              echo "Recovery mode: building source_ref=${SOURCE_REF}, publishing to tag=${VERSION}"
            else
              REF="refs/tags/${VERSION}"
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION="${RELEASE_TAG_NAME}"
            if [[ -z "$VERSION" ]]; then
              echo "::error::release event fired without a tag_name"
              exit 1
            fi
            # Ensure the tag is fetched locally
            git fetch origin "refs/tags/${VERSION}:refs/tags/${VERSION}" 2>/dev/null || true
            if ! git rev-parse --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
              echo "::error::release event for ${VERSION} — tag not found on remote"
              exit 1
            fi
            REF="refs/tags/${VERSION}"
          elif [[ "${GITHUB_EVENT_NAME}" == "create" ]]; then
            if [[ "${EVENT_REF_TYPE}" == "tag" && "${EVENT_REF}" == v* ]]; then
              VERSION="${EVENT_REF}"
              REF="refs/tags/${VERSION}"
            elif [[ "${EVENT_REF_TYPE}" == "branch" && "${EVENT_REF}" == release/* ]]; then
              VERSION="${EVENT_REF#release/}"
              REF="refs/heads/${EVENT_REF}"
            else
              echo "Create event for ${EVENT_REF_TYPE} '${EVENT_REF}' is not a release ref; skipping."
              {
                echo "version=skip"
                echo "ref=${GITHUB_REF}"
                echo "publish_tag=skip"
                echo "skip=true"
              } >> "$GITHUB_OUTPUT"
              exit 0
            fi
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            REF="${GITHUB_REF}"
          elif [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            VERSION="${GITHUB_REF_NAME#release/}"
            REF="${GITHUB_REF}"
          else
            echo "::error::Unexpected ref: $GITHUB_REF"
            exit 1
          fi
          {
            echo "version=${VERSION}"
            echo "ref=${REF}"
            echo "publish_tag=${VERSION}"
            echo "skip=false"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (ref=${REF})"

      - name: Checkout resolved ref
        if: steps.version.outputs.skip != 'true'
        run: git checkout "${{ steps.version.outputs.ref }}"

      - name: Enforce lowercase .md filenames
        if: steps.version.outputs.skip != 'true'
        run: |
          VIOLATIONS=$(find . -name '*.md' \
            -not -path './node_modules/*' \
            -not -path './.git/*' \
            -not -path './skipped/*' \
            | grep '[A-Z]' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Uppercase .md filenames found — all .md files must be lowercase hyphen-case:"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ All .md filenames are lowercase"

      - name: Setup Node.js
        if: steps.version.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        if: steps.version.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        if: steps.version.outputs.skip != 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Run root lint
        if: steps.version.outputs.skip != 'true'
        run: pnpm run lint

      - name: Run tests
        if: steps.version.outputs.skip != 'true'
        run: pnpm run test

  # ════════════════════════════════════════════════════════════
  # Job 2: Build SDK (dependency for other standalone scripts)
  # ════════════════════════════════════════════════════════════
  build-sdk:
    name: Build · Marco SDK
    needs: setup
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Marco SDK
        run: pnpm run build:sdk

      - name: Upload SDK dist
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3a: Build XPath (parallel with 3b, 3c)
  # ════════════════════════════════════════════════════════════
  build-xpath:
    name: Build · XPath
    needs: [setup, build-sdk]
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Build XPath
        run: pnpm run build:xpath

      - name: Upload XPath dist
        uses: actions/upload-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3b: Build Macro Controller (parallel with 3a, 3c)
  # ════════════════════════════════════════════════════════════
  build-macro-controller:
    name: Build · Macro Controller
    needs: [setup, build-sdk]
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      # See ci.yml for rationale — content-hash cache for the LESS output.
      - name: Cache macro-looping.css (LESS output)
        uses: actions/cache@v4
        with:
          path: |
            standalone-scripts/macro-controller/dist/macro-looping.css
            standalone-scripts/macro-controller/dist/.cache
          key: ${{ runner.os }}-macro-less-${{ hashFiles('standalone-scripts/macro-controller/less/**/*.less', 'scripts/compile-less.mjs', 'pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-macro-less-

      - name: Build Macro Controller
        run: pnpm run build:macro-controller

      - name: Upload Macro Controller dist
        uses: actions/upload-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 3c: Build Prompts (parallel with 3a, 3b)
  # ════════════════════════════════════════════════════════════
  build-prompts:
    name: Build · Prompts
    needs: setup
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Prompts
        run: pnpm run build:prompts

      - name: Upload Prompts
        uses: actions/upload-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Job 4: Build Extension + Package + Release
  # ════════════════════════════════════════════════════════════
  release:
    name: Build · Extension · Release
    needs: [setup, build-sdk, build-xpath, build-macro-controller, build-prompts]
    if: needs.setup.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download SDK dist
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: standalone-scripts/marco-sdk/dist/

      - name: Download XPath dist
        uses: actions/download-artifact@v4
        with:
          name: xpath-dist
          path: standalone-scripts/xpath/dist/

      - name: Download Macro Controller dist
        uses: actions/download-artifact@v4
        with:
          name: macro-controller-dist
          path: standalone-scripts/macro-controller/dist/

      - name: Download Prompts
        uses: actions/download-artifact@v4
        with:
          name: prompts-dist
          path: standalone-scripts/prompts/

      - name: Build support plugin outputs
        run: |
          set -euo pipefail
          pnpm run build:payment-banner-hider
          pnpm run build:lovable-common
          pnpm run build:lovable-owner-switch
          pnpm run build:lovable-user-add
          pnpm run build:lovable-dashboard

      - name: Build Chrome extension
        run: pnpm run build:extension

      # The Chrome extension dist is `chrome-extension/` itself (see
      # `vite.config.extension.ts` → `outDir: DIST_DIR = resolve(__dirname, "chrome-extension")`
      # and `powershell.json -> distDir = "chrome-extension"`). There is NO
      # `chrome-extension/dist/` subfolder. Using the wrong path here silently
      # produced empty/missing release assets — see RCA in
      # `mem://constraints/chrome-extension-dist-path` and changelog v2.243.0.
      - name: Verify chrome-extension build output exists
        run: |
          if [ ! -f chrome-extension/manifest.json ]; then
            echo "::error::chrome-extension/manifest.json not found — extension build did not produce expected output"
            ls -la chrome-extension/ || true
            exit 1
          fi
          echo "✅ chrome-extension/ build output present"

      - name: Verify no source maps in extension build
        run: |
          MAP_FILES=$(find chrome-extension -name '*.map' 2>/dev/null || true)
          if [ -n "$MAP_FILES" ]; then
            echo "::error::Source map files found — production builds must not include .map files:"
            echo "$MAP_FILES"
            exit 1
          fi
          echo "✅ No source map files in chrome-extension/"

      # ── Package assets ────────────────────────────────────
      - name: Package release assets
        env:
          VER: ${{ needs.setup.outputs.publish_tag }}
        run: |
          mkdir -p release-assets

          # ── Copy README + VERSION into extension build ──
          cp readme.md chrome-extension/readme.md
          echo "${VER}" > chrome-extension/VERSION

          # ── Remove source maps (must never ship in releases) ──
          MAP_COUNT=$(find chrome-extension -name '*.map' | wc -l | tr -d ' ')
          find chrome-extension -name '*.map' -delete
          echo "Removed ${MAP_COUNT} source map files"

          # ── Chrome extension — zip chrome-extension/ contents (load-unpacked target) ──
          cd chrome-extension
          zip -r "../release-assets/marco-extension-${VER}.zip" .
          cd ..

          # ── Verify the extension zip was actually produced and is non-trivial ──
          if [ ! -s "release-assets/marco-extension-${VER}.zip" ]; then
            echo "::error::marco-extension-${VER}.zip is missing or empty"
            ls -la release-assets/ || true
            exit 1
          fi
          EXT_ZIP_SIZE=$(stat -c%s "release-assets/marco-extension-${VER}.zip")
          if [ "$EXT_ZIP_SIZE" -lt 10240 ]; then
            echo "::error::marco-extension-${VER}.zip is suspiciously small (${EXT_ZIP_SIZE} bytes) — likely a packaging-path regression"
            exit 1
          fi
          echo "✅ marco-extension-${VER}.zip = ${EXT_ZIP_SIZE} bytes"

          # ── Standalone scripts ──
          if [ -d "standalone-scripts/prompts" ]; then
            cd standalone-scripts/prompts
            zip -r "../../release-assets/prompts-${VER}.zip" .
            cd ../..
          fi

          PLUGINS=(
            "macro-controller"
            "marco-sdk"
            "xpath"
            "payment-banner-hider"
            "lovable-common"
            "lovable-owner-switch"
            "lovable-user-add"
            "lovable-dashboard"
          )
          for plugin in "${PLUGINS[@]}"; do
            if [ ! -d "standalone-scripts/${plugin}" ]; then
              echo "::error file=standalone-scripts/${plugin}::Required plugin folder missing; release page must include every plugin ZIP"
              exit 1
            fi
            (cd "standalone-scripts/${plugin}" && zip -r "../../release-assets/${plugin}-${VER}.zip" .)
          done

          # ── Unified installer (URL-pinned when fetched from this release) ──
          # No stamping needed: install.{ps1,sh} parse the version from their
          # own download URL when fetched from /releases/download/{VER}/.
          cp scripts/install.sh  release-assets/install.sh
          cp scripts/install.ps1 release-assets/install.ps1
          chmod +x release-assets/install.sh

          # ── VERSION.txt ──
          echo "${VER}" > release-assets/VERSION.txt

          # ── changelog.md (full project changelog) ──
          if [ -f changelog.md ]; then
            cp changelog.md release-assets/changelog.md
          fi

          # ── Generate checksums ──
          cd release-assets
          sha256sum -- * > checksums.txt
          cat checksums.txt
          cd ..

          echo ""
          echo "=== Release assets ==="
          ls -lh release-assets/

      # ── Generate release notes from commit history ────────
      - name: Generate release notes
        id: changelog
        env:
          VER: ${{ needs.setup.outputs.publish_tag }}
        run: |
          # Find the previous release tag
          # Find the previous release tag — EXCLUDE the current ${VER} so the
          # range is never empty on a tag-triggered run. See plan.md Step 2.
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]' \
            | grep -v -x "${VER}" \
            | head -1 2>/dev/null || true)

          if [ -n "$PREV_TAG" ]; then
            echo "Generating changelog: ${PREV_TAG}..${VER} (HEAD)"
            LOG_RANGE=("${PREV_TAG}..HEAD")
          else
            echo "No previous tag found — using full history"
            LOG_RANGE=()
          fi

          REPO="${GITHUB_REPOSITORY}"
          COMMIT_SHA="${GITHUB_SHA}"
          BRANCH="${GITHUB_REF_NAME}"
          BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # Build categorized release notes
          {
            echo "## Marco Extension ${VER}"
            echo ""

            echo "### Release Info"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VER}\` |"
            echo "| Commit | \`${COMMIT_SHA:0:10}\` |"
            echo "| Branch | \`${BRANCH}\` |"
            echo "| Build Date | ${BUILD_DATE} |"
            echo ""

            echo "### What's Changed"
            echo ""

            # Features
            FEATS=$(git log "${LOG_RANGE[@]}" --pretty=format:"- %s (%h)" --grep="^feat" -i 2>/dev/null || true)
            if [ -n "$FEATS" ]; then
              echo "#### Features"
              echo "$FEATS"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "${LOG_RANGE[@]}" --pretty=format:"- %s (%h)" --grep="^fix" -i 2>/dev/null || true)
            if [ -n "$FIXES" ]; then
              echo "#### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Refactors / chores / docs
            OTHER=$(git log "${LOG_RANGE[@]}" --pretty=format:"- %s (%h)" --grep="^refactor\|^chore\|^docs\|^style\|^perf\|^test\|^ci\|^build" -i 2>/dev/null || true)
            if [ -n "$OTHER" ]; then
              echo "#### Maintenance"
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo ""

            echo "### Checksums (SHA256)"
            echo ""
            echo "\`\`\`"
            cat release-assets/checksums.txt
            echo "\`\`\`"
            echo ""

            echo "### Build Provenance"
            echo ""
            echo "All release assets are accompanied by a **SLSA build-provenance attestation** generated via GitHub Attestations."
            echo ""
            echo "Verify an artifact after downloading:"
            echo ""
            echo "\`\`\`bash"
            echo "gh attestation verify marco-extension-${VER}.zip --repo ${REPO}"
            echo "\`\`\`"
            echo ""

            echo "### Assets"
            echo ""
            echo "| Asset | Description |"
            echo "|-------|-------------|"
            echo "| \`marco-extension-${VER}.zip\` | Chrome extension — load unpacked in \`chrome://extensions\` |"
            echo "| \`macro-controller-${VER}.zip\` | Standalone macro controller |"
            echo "| \`marco-sdk-${VER}.zip\` | SDK library |"
            echo "| \`xpath-${VER}.zip\` | XPath utility |"
            echo "| \`payment-banner-hider-${VER}.zip\` | Payment banner hider plugin |"
            echo "| \`lovable-common-${VER}.zip\` | Lovable common plugin |"
            echo "| \`lovable-owner-switch-${VER}.zip\` | Lovable owner switch plugin |"
            echo "| \`lovable-user-add-${VER}.zip\` | Lovable user add plugin |"
            echo "| \`lovable-dashboard-${VER}.zip\` | Lovable dashboard plugin |"
            echo "| \`prompts-${VER}.zip\` | Prompt templates |"
            echo "| \`changelog.md\` | Full project changelog |"
            echo "| \`install.ps1\` | Unified PowerShell installer (URL-pinned to this release when fetched here) |"
            echo "| \`install.sh\` | Unified Bash installer (URL-pinned to this release when fetched here) |"
            echo "| \`VERSION.txt\` | Version identifier |"
            echo "| \`checksums.txt\` | SHA256 checksums |"
            echo "| \`checksums.txt.minisig\` | Minisign signature for checksums.txt (when published) |"
            echo ""
            echo "### Quick Install"
            echo ""
            echo "### 📦 Download-only (unpack into current folder)"
            echo ""
            echo "For quick local testing — downloads the release ZIP **into the current folder as a backup** and extracts it as a flat folder (no \`v\`, no version suffix). The ZIP is kept next to the extracted folder; only the extracted folder is overwritten on re-run. No \`\$HOME\` install, no profile changes, no auto-update wiring."
            echo ""
            echo "**Windows · PowerShell — latest into \`.\\marco-extension\`:**"
            echo ""
            echo "\`\`\`powershell"
            echo "irm https://raw.githubusercontent.com/${REPO}/main/scripts/download-extension.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "**Windows · PowerShell — pin a version + custom folder name (env-var form, works with \`irm | iex\`):**"
            echo ""
            echo "\`\`\`powershell"
            echo "\$env:MARCO_DL_VERSION='${VER}'; \$env:MARCO_DL_FOLDER='marco'; irm https://raw.githubusercontent.com/${REPO}/main/scripts/download-extension.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "**Windows · PowerShell — run a local clone with explicit flags:**"
            echo ""
            echo "\`\`\`powershell"
            echo ".\\scripts\\download-extension.ps1 -Version ${VER} -FolderName marco-extension"
            echo "\`\`\`"
            echo ""
            echo "After it finishes, load the resulting folder via \`chrome://extensions → Load unpacked\`. The \`marco-extension-${VER}.zip\` backup sits next to it."
            echo ""
            echo "#### 🔒 Pinned to \`${VER}\` (recommended from this page)"
            echo ""
            echo "These one-liners download \`install.{ps1,sh}\` from **this release's** assets — the script auto-derives \`${VER}\` from its own URL and installs exactly that version."
            echo ""
            echo "**Windows (PowerShell):**"
            echo "\`\`\`powershell"
            echo "irm https://github.com/${REPO}/releases/download/${VER}/install.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "**Linux / macOS:**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://github.com/${REPO}/releases/download/${VER}/install.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "#### 🌊 Latest channel (auto-update)"
            echo ""
            echo "These one-liners always resolve the newest published release."
            echo ""
            echo "**Windows (PowerShell):**"
            echo "\`\`\`powershell"
            echo "irm https://raw.githubusercontent.com/${REPO}/main/scripts/install.ps1 | iex"
            echo "\`\`\`"
            echo ""
            echo "**Linux / macOS:**"
            echo "\`\`\`bash"
            echo "curl -fsSL https://raw.githubusercontent.com/${REPO}/main/scripts/install.sh | bash"
            echo "\`\`\`"
            echo ""
            echo "### Manual Install (Chromium)"
            echo ""
            echo "1. Download \`marco-extension-${VER}.zip\` from this release."
            echo "2. Extract it to a local folder."
            echo "3. Open \`chrome://extensions\`."
            echo "4. Enable **Developer mode**."
            echo "5. Click **Load unpacked** and select the extracted folder."
          } > release-assets/RELEASE_NOTES.md

          cat release-assets/RELEASE_NOTES.md

      # ── Verify required release assets are present and non-trivial ────────
      # See plan.md Step 3 and mem://constraints/release-assets-publish-contract.
      - name: Verify required release assets
        env:
          VER: ${{ needs.setup.outputs.publish_tag }}
        run: |
          set -e
          REQUIRED=(
            "release-assets/marco-extension-${VER}.zip:10240"
            "release-assets/macro-controller-${VER}.zip:1024"
            "release-assets/marco-sdk-${VER}.zip:1024"
            "release-assets/xpath-${VER}.zip:1024"
            "release-assets/payment-banner-hider-${VER}.zip:1024"
            "release-assets/lovable-common-${VER}.zip:1024"
            "release-assets/lovable-owner-switch-${VER}.zip:1024"
            "release-assets/lovable-user-add-${VER}.zip:1024"
            "release-assets/lovable-dashboard-${VER}.zip:1024"
            "release-assets/install.ps1:512"
            "release-assets/install.sh:512"
            "release-assets/VERSION.txt:1"
            "release-assets/changelog.md:64"
            "release-assets/checksums.txt:64"
            "release-assets/RELEASE_NOTES.md:128"
          )
          MISSING=0
          for entry in "${REQUIRED[@]}"; do
            f="${entry%%:*}"
            min="${entry##*:}"
            if [ ! -f "$f" ]; then
              echo "::error file=$f::Required release asset missing"
              MISSING=$((MISSING+1))
              continue
            fi
            sz=$(stat -c%s "$f")
            if [ "$sz" -lt "$min" ]; then
              echo "::error file=$f::Release asset too small (${sz} bytes, min ${min})"
              MISSING=$((MISSING+1))
            else
              echo "✅ $f (${sz} bytes)"
            fi
          done
          # prompts is conditional — required only when the folder exists
          if [ -d "standalone-scripts/prompts" ]; then
            f="release-assets/prompts-${VER}.zip"
            if [ ! -s "$f" ]; then
              echo "::error file=$f::prompts/ exists but ${f} is missing or empty"
              MISSING=$((MISSING+1))
            else
              echo "✅ $f"
            fi
          fi
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::${MISSING} required release asset(s) missing — refusing to publish GitHub Release"
            ls -la release-assets/ || true
            exit 1
          fi
          echo "✅ All required release assets present"

      # ── Generate minisign signature (conditional on secret availability) ──
      - name: Sign checksums with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "No MINISIGN_SECRET_KEY secret available — skipping signature generation."
            echo "::notice::To enable minisign signing: add MINISIGN_SECRET_KEY to repository secrets."
            exit 0
          fi
          if ! command -v minisign >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          fi
          mkdir -p /tmp/minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > /tmp/minisign/minisign.key
          minisign -S -m release-assets/checksums.txt -s /tmp/minisign/minisign.key -x release-assets/checksums.txt.minisig
          shred -u /tmp/minisign/minisign.key
          rmdir /tmp/minisign 2>/dev/null || true
          echo "✅ Signed checksums.txt → checksums.txt.minisig"

      # ── Attest build provenance (SLSA) ─────────────────────
      - name: Attest release assets
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            release-assets/checksums.txt
            release-assets/*.zip

      # ── Create GitHub Release ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.publish_tag }}
          name: "Marco Extension ${{ needs.setup.outputs.publish_tag }}"
          body_path: release-assets/RELEASE_NOTES.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(needs.setup.outputs.publish_tag, '-') }}
          make_latest: ${{ !contains(needs.setup.outputs.publish_tag, '-') }}

      - name: Verify GitHub Release upload completed
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VER: ${{ needs.setup.outputs.publish_tag }}
        run: |
          set -euo pipefail
          REQUIRED=(
            "marco-extension-${VER}.zip"
            "macro-controller-${VER}.zip"
            "marco-sdk-${VER}.zip"
            "xpath-${VER}.zip"
            "payment-banner-hider-${VER}.zip"
            "lovable-common-${VER}.zip"
            "lovable-owner-switch-${VER}.zip"
            "lovable-user-add-${VER}.zip"
            "lovable-dashboard-${VER}.zip"
            "install.ps1"
            "install.sh"
            "VERSION.txt"
            "changelog.md"
            "checksums.txt"
            "RELEASE_NOTES.md"
          )
          if [ -d "standalone-scripts/prompts" ]; then
            REQUIRED+=("prompts-${VER}.zip")
          fi
          ASSETS=$(gh release view "${VER}" --repo "${REPO}" --json assets --jq '.assets[].name')
          MISSING=0
          for asset in "${REQUIRED[@]}"; do
            if ! printf '%s\n' "${ASSETS}" | grep -qx "${asset}"; then
              echo "::error::GitHub Release ${VER} is missing uploaded asset: ${asset}"
              MISSING=$((MISSING+1))
            fi
          done
          if [ "${MISSING}" -gt 0 ]; then
            echo "::error::${MISSING} uploaded release asset(s) missing after action-gh-release completed"
            printf '%s\n' "${ASSETS}"
            exit 1
          fi
          echo "✅ GitHub Release ${VER} contains all required uploaded assets"
